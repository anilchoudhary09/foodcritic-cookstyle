# b-cookstyle-rules - Minimal Cookstyle + BARC Rules Configuration
#
# Usage: cookstyle <cookbook> --config cookbooks/b-cookstyle-rules/.rubocop.yml
#
# This config:
#   - Uses ALL standard Cookstyle cops (default)
#   - Adds ALL BARC security rules (BARC001-036) from barc_cops.rb
#   - All BARC exceptions managed in rules.rb only

require:
  - ./barc_cops.rb

AllCops:
  NewCops: enable
  Exclude:
    - "vendor/**/*"
    - "rules.rb"
    - ".rubocop.yml"

# BARC Security Rules (001-020)
Barclays/Barc001NoLocalUsers:
  Enabled: true
  Severity: error

Barclays/Barc002NoLocalGroups:
  Enabled: true
  Severity: error

Barclays/Barc003NoRootSsh:
  Enabled: true
  Severity: error

Barclays/Barc004NoSshKeys:
  Enabled: true
  Severity: error

Barclays/Barc005EtcBlacklist:
  Enabled: true
  Severity: error

Barclays/Barc005aEtcBlacklistAttributes:
  Enabled: true
  Severity: error

Barclays/Barc006NoReboot:
  Enabled: true
  Severity: error

Barclays/Barc007NoSelinux:
  Enabled: true
  Severity: error

Barclays/Barc008NoKillProcess:
  Enabled: true
  Severity: warning

Barclays/Barc009NoFirewall:
  Enabled: true
  Severity: error

Barclays/Barc010NoInit:
  Enabled: true
  Severity: error

Barclays/Barc011NoRemoveFiles:
  Enabled: true
  Severity: warning

Barclays/Barc012NoKernel:
  Enabled: true
  Severity: error

Barclays/Barc013NoVolume:
  Enabled: true
  Severity: error

Barclays/Barc014NoNetwork:
  Enabled: true
  Severity: error

Barclays/Barc015NoRootCron:
  Enabled: true
  Severity: error

Barclays/Barc016UseChefResources:
  Enabled: true
  Severity: convention

Barclays/Barc017NoSystemServices:
  Enabled: true
  Severity: error

Barclays/Barc018ReviewService:
  Enabled: true
  Severity: warning

Barclays/Barc019NoFindSudo:
  Enabled: true
  Severity: error

Barclays/Barc020NoMiscCommands:
  Enabled: true
  Severity: warning

# BARC Metadata Rules (021-033)
Barclays/Barc021ExactVersionDependency:
  Enabled: true
  Severity: warning

Barclays/Barc022NoChefExit:
  Enabled: true
  Severity: error

Barclays/Barc023SupportedPlatform:
  Enabled: true
  Severity: warning

Barclays/Barc024MaintainerInfo:
  Enabled: true
  Severity: warning

Barclays/Barc025UnauthorizedTags:
  Enabled: true
  Severity: error

Barclays/Barc026NoNodeSave:
  Enabled: true
  Severity: error

Barclays/Barc027MiddlewarePackages:
  Enabled: true
  Severity: error

Barclays/Barc028RestrictedCookbookDeps:
  Enabled: true
  Severity: error

Barclays/Barc029CommunityCookbooks:
  Enabled: true
  Severity: error

Barclays/Barc030DeprecatedCookbooks:
  Enabled: true
  Severity: error

Barclays/Barc031ControlledPackages:
  Enabled: true
  Severity: error

Barclays/Barc032CookbookVersionFlags:
  Enabled: true
  Severity: error

Barclays/Barc033AllowedPinsOnly:
  Enabled: true
  Severity: error

# BARC Attribute Rules (034-036)
Barclays/Barc034RestrictedAttributesRoles:
  Enabled: true
  Severity: error

Barclays/Barc035RestrictedAttributes:
  Enabled: true
  Severity: error

Barclays/Barc036JavaVersionPin:
  Enabled: true
  Severity: error

Barclays/AttributeRestriction:
  Enabled: true
  Severity: error
