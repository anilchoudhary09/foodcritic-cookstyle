# Custom Cookstyle Rules for b-foodcritic-cookstyle cookbook
#
# This file configures Cookstyle (RuboCop) for the cookbook
# and enables/disables specific cops
#
# Cookstyle inherits from RuboCop and adds Chef-specific cops
# See: https://github.com/chef/cookstyle

# Inherit from Cookstyle's default configuration
inherit_from:
  - .rubocop_custom_rules.yml

AllCops:
  # Target Ruby version (Chef Infra Client 18+ uses Ruby 3.1)
  TargetRubyVersion: 3.1

  # Files to include in analysis
  Include:
    - '**/*.rb'
    - '**/Berksfile'
    - '**/metadata.rb'
    - '**/Policyfile.rb'

  # Files to exclude from analysis
  Exclude:
    - 'vendor/**/*'
    - 'test/fixtures/**/*'
    - 'files/**/*'
    - 'templates/**/*.erb'

# =============================================================================
# CHEF-SPECIFIC COPS
# =============================================================================

# Enforce modern Chef Infra syntax
Chef/Modernize:
  Enabled: true

# Catch deprecations before they become errors
Chef/Deprecations:
  Enabled: true

# Ensure code correctness
Chef/Correctness:
  Enabled: true

# Enforce consistent style in Chef code
Chef/Style:
  Enabled: true

# Security-related cops
Chef/Security:
  Enabled: true

# Redundant code detection
Chef/RedundantCode:
  Enabled: true

# =============================================================================
# CUSTOM COP CONFIGURATIONS
# =============================================================================

# Require action to be explicitly defined in resources
Chef/Style/ImmediateNotificationTiming:
  Enabled: true

# Prefer :before notifications over :immediate when possible
Chef/Style/UnnecessaryOSCheck:
  Enabled: true

# =============================================================================
# LAYOUT COPS
# =============================================================================

# Maximum line length
Layout/LineLength:
  Max: 120
  AllowHeredoc: true
  AllowURI: true

# Consistent indentation
Layout/IndentationStyle:
  EnforcedStyle: spaces
  IndentationWidth: 2

# Empty lines around blocks
Layout/EmptyLinesAroundBlockBody:
  Enabled: true

# =============================================================================
# STYLE COPS
# =============================================================================

# Use single quotes for strings without interpolation
Style/StringLiterals:
  EnforcedStyle: single_quotes

# Prefer && and || over 'and' and 'or'
Style/AndOr:
  Enabled: true

# Use safe navigation operator
Style/SafeNavigation:
  Enabled: true

# Frozen string literal comment
Style/FrozenStringLiteralComment:
  Enabled: false  # Chef recipes don't typically need this

# Hash syntax
Style/HashSyntax:
  EnforcedStyle: ruby19

# =============================================================================
# NAMING COPS
# =============================================================================

# Block parameter naming
Naming/BlockParameterName:
  Enabled: true

# Method naming
Naming/MethodName:
  EnforcedStyle: snake_case

# =============================================================================
# METRICS COPS
# =============================================================================

# Method length
Metrics/MethodLength:
  Max: 30

# Block length (Chef resources can be long)
Metrics/BlockLength:
  Exclude:
    - 'recipes/**/*.rb'
    - 'spec/**/*.rb'
    - 'test/**/*.rb'

# =============================================================================
# CUSTOM SEVERITY OVERRIDES
# =============================================================================

# Make certain violations warnings instead of errors
Chef/Deprecations/ResourceUsesOnlyResourceName:
  Severity: warning

Chef/Modernize/RespondToInMetadata:
  Severity: warning
