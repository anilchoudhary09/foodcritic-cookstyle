# Configuration parameters: AllowURI, URISchemes.
Metrics/LineLength:
  Max: 300

# Ignore Snake_case rule for filename.
Style/FileName:
  Enabled: false

# Ignore NumericLiterals rule for separating numbers
Style/NumericLiterals:
  Enabled: false

# Ignore MultilineOperationIndentation
Layout/MultilineOperationIndentation:
  Enabled: false

Metrics/CyclomaticComplexity:
  Max: 25

Metrics/PerceivedComplexity:
  Max: 30

Metrics/AbcSize:
  Max: 40

Metrics/MethodLength:
  Max: 60
  
Metrics/BlockLength:
  Max: 100
