# b-cookstyle-rules - Custom Cookstyle Cops for Organization
#
# This configuration enables both:
# 1. Standard Cookstyle rules (200+ Chef best practices)
# 2. Custom BARC rules (organization security policies)
#
# Usage:
#   cookstyle .                    # Run all checks
#   cookstyle --autocorrect .      # Auto-fix where possible
#   cookstyle --format json .      # JSON output for CI/CD
#
# To check a specific cookbook:
#   cookstyle /path/to/cookbook

inherit_from: .rubocop_todo.yml

# Load custom BARC cops
require:
  - ./lib/rubocop/cop/barclays_cops

AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  SuggestExtensions: false
  DisplayCopNames: true
  DisplayStyleGuide: true
  ExtraDetails: true

  # Chef cookbook files
  Include:
    - '**/*.rb'
    - '**/metadata.rb'
    - '**/Berksfile'
    - '**/Policyfile.rb'

  # Exclude non-cookbook files
  Exclude:
    - 'vendor/**/*'
    - 'test/fixtures/**/*'
    - 'spec/fixtures/**/*'
    - 'tmp/**/*'
    - 'node_modules/**/*'
    - 'rules.rb'  # Exclude old Foodcritic rules file

# ============================================================
# BARCLAYS CUSTOM SECURITY RULES (BARC001-BARC019)
# ============================================================

Barclays/Barc001NoLocalUsers:
  Description: 'Prohibits local user manipulation - use centralized identity management'
  Enabled: true
  Severity: error

Barclays/Barc002NoLocalGroups:
  Description: 'Prohibits local group manipulation - use centralized identity management'
  Enabled: true
  Severity: error

Barclays/Barc003NoRootSsh:
  Description: 'Prohibits root .ssh directory manipulation'
  Enabled: true
  Severity: error

Barclays/Barc005EtcBlacklist:
  Description: 'Enforces /etc directory blacklist for protected system files'
  Enabled: true
  Severity: error

Barclays/Barc006NoReboot:
  Description: 'Prohibits reboot/shutdown commands in cookbooks'
  Enabled: true
  Severity: error

Barclays/Barc007NoSelinux:
  Description: 'Prohibits SELinux manipulation - managed by security team'
  Enabled: true
  Severity: error

Barclays/Barc008NoKillProcess:
  Description: 'Prohibits kill and process priority manipulation'
  Enabled: true
  Severity: warning

Barclays/Barc009NoFirewall:
  Description: 'Prohibits firewall manipulation - managed by network team'
  Enabled: true
  Severity: error

Barclays/Barc011NoRemoveFiles:
  Description: 'Prohibits dangerous file/directory removal patterns'
  Enabled: true
  Severity: warning

Barclays/Barc016UseChefResources:
  Description: 'Recommends Chef resources instead of shell commands'
  Enabled: true
  Severity: convention

Barclays/Barc017NoSystemServices:
  Description: 'Prohibits manipulation of protected system services'
  Enabled: true
  Severity: error

Barclays/Barc019NoFindSudo:
  Description: 'Prohibits dangerous find/sudo/chmod patterns'
  Enabled: true
  Severity: error

# ============================================================
# STANDARD COOKSTYLE OVERRIDES
# ============================================================

Layout/LineLength:
  Max: 120

Style/StringLiterals:
  EnforcedStyle: single_quotes

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Style/Documentation:
  Enabled: false

Style/GuardClause:
  MinBodyLength: 3

# ============================================================
# CHEF-SPECIFIC COPS (from Cookstyle)
# ============================================================

Chef/Modernize/RespondToInMetadata:
  Enabled: true

Chef/Modernize/UnnecessaryMixlibShelloutRequire:
  Enabled: true

Chef/Security/SshPrivateKey:
  Enabled: true

Chef/Deprecations/DeprecatedChefSpecPlatform:
  Enabled: true

Chef/Correctness/InvalidPlatformFamilyHelper:
  Enabled: true

