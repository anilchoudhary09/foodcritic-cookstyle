# Cookstyle Configuration for compliant-cookbook
# This cookbook follows ALL Barclays security policies
# Exceptions are defined in b-cookstyle-rules/rules.rb

require:
  - ../b-cookstyle-rules/barc_cops.rb

AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  DisplayCopNames: true
  DisplayStyleGuide: true
  ExtraDetails: true

  Include:
    - '**/*.rb'
    - '**/metadata.rb'

  Exclude:
    - 'vendor/**/*'
    - 'test/fixtures/**/*'

# Enable all BARC rules
Barclays/Barc001NoLocalUsers:
  Enabled: true
  Severity: error

Barclays/Barc002NoLocalGroups:
  Enabled: true
  Severity: error

Barclays/Barc003NoRootSsh:
  Enabled: true
  Severity: error

Barclays/Barc005EtcBlacklist:
  Enabled: true
  Severity: error

Barclays/Barc006NoReboot:
  Enabled: true
  Severity: error

Barclays/Barc007NoSelinux:
  Enabled: true
  Severity: error

Barclays/Barc008NoKillProcess:
  Enabled: true
  Severity: warning

Barclays/Barc009NoFirewall:
  Enabled: true
  Severity: error

Barclays/Barc011NoRemoveFiles:
  Enabled: true
  Severity: warning

Barclays/Barc016UseChefResources:
  Enabled: true
  Severity: convention

Barclays/Barc017NoSystemServices:
  Enabled: true
  Severity: error

Barclays/Barc019NoFindSudo:
  Enabled: true
  Severity: error

# Standard overrides
Layout/LineLength:
  Max: 120

Style/Documentation:
  Enabled: false
