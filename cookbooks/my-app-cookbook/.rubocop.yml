# Cookstyle Configuration for my-app-cookbook
#
# This config loads:
# 1. Standard Cookstyle rules (200+ Chef best practices)
# 2. Custom BARC rules (organization security policies)
#
# Exceptions are defined in b-cookstyle-rules/rules.rb
#
# Usage:
#   cookstyle .                    # Run all checks
#   cookstyle --autocorrect .      # Auto-fix issues
#   cookstyle --format json .      # JSON output

# Load custom BARC cops (reads exceptions from rules.rb)
require:
  - ../b-cookstyle-rules/barc_cops.rb

AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  DisplayCopNames: true
  DisplayStyleGuide: true
  ExtraDetails: true

  Include:
    - '**/*.rb'
    - '**/metadata.rb'

  Exclude:
    - 'vendor/**/*'
    - 'test/fixtures/**/*'

# ============================================================
# BARCLAYS CUSTOM SECURITY RULES
# ============================================================

Barclays/Barc001NoLocalUsers:
  Enabled: true
  Severity: error

Barclays/Barc002NoLocalGroups:
  Enabled: true
  Severity: error

Barclays/Barc003NoRootSsh:
  Enabled: false
  Severity: error

Barclays/Barc005EtcBlacklist:
  Enabled: true
  Severity: error

Barclays/Barc006NoReboot:
  Enabled: true
  Severity: error

Barclays/Barc007NoSelinux:
  Enabled: true
  Severity: error

Barclays/Barc008NoKillProcess:
  Enabled: true
  Severity: warning

Barclays/Barc009NoFirewall:
  Enabled: true
  Severity: error

Barclays/Barc011NoRemoveFiles:
  Enabled: true
  Severity: warning

Barclays/Barc016UseChefResources:
  Enabled: true
  Severity: convention

Barclays/Barc017NoSystemServices:
  Enabled: true
  Severity: error

Barclays/Barc019NoFindSudo:
  Enabled: true
  Severity: error

# ============================================================
# STANDARD OVERRIDES
# ============================================================

Layout/LineLength:
  Max: 120

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always
