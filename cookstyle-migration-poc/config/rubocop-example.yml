# Example .rubocop.yml for cookbooks using b-cookstyle-rules
#
# Place this file in your cookbook root directory
# All inherited rules from Cookstyle and b-cookstyle-rules will be automatically loaded

# Require the custom rules gem
require:
  - b_cookstyle_rules

# Inherit from Cookstyle defaults
inherit_gem:
  cookstyle: config/cookstyle.yml

AllCops:
  TargetRubyVersion: 3.1
  TargetChefVersion: 18.0
  NewCops: enable
  SuggestExtensions: false
  DisplayCopNames: true
  DisplayStyleGuide: true
  ExtraDetails: true

  # Include Chef-specific files
  Include:
    - '**/*.rb'
    - '**/Berksfile'
    - '**/Gemfile'
    - '**/Rakefile'
    - '**/Policyfile.rb'

  # Exclude non-cookbook files
  Exclude:
    - 'vendor/**/*'
    - 'test/fixtures/**/*'
    - 'spec/fixtures/**/*'
    - 'tmp/**/*'
    - 'node_modules/**/*'

# ============================================================
# Barclays Custom Rules Configuration
# ============================================================

# BARC001: No local user manipulation
Barclays/Barc001NoLocalUsers:
  Enabled: true
  Severity: error

# BARC002: No local group manipulation
Barclays/Barc002NoLocalGroups:
  Enabled: true
  Severity: error

# BARC003: No root SSH manipulation
Barclays/Barc003NoRootSsh:
  Enabled: true
  Severity: error

# BARC005: /etc blacklist enforcement
Barclays/Barc005EtcBlacklist:
  Enabled: true
  Severity: error

# BARC006: No reboot/shutdown
Barclays/Barc006NoReboot:
  Enabled: true
  Severity: error

# BARC007: No SELinux manipulation
Barclays/Barc007NoSelinux:
  Enabled: true
  Severity: error

# BARC008: No kill/process priority changes
Barclays/Barc008NoKillProcess:
  Enabled: true
  Severity: warning

# BARC009: No firewall manipulation
Barclays/Barc009NoFirewall:
  Enabled: true
  Severity: error

# BARC011: No file/directory removal
Barclays/Barc011NoRemoveFiles:
  Enabled: true
  Severity: warning

# BARC016: Use Chef resources instead of commands
Barclays/Barc016UseChefResources:
  Enabled: true
  Severity: convention

# BARC017: No system service manipulation
Barclays/Barc017NoSystemServices:
  Enabled: true
  Severity: error

# BARC019: No dangerous find/sudo patterns
Barclays/Barc019NoFindSudo:
  Enabled: true
  Severity: error

# ============================================================
# Standard Cookstyle Rule Overrides
# ============================================================

# Allow older Ruby syntax for compatibility
Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

# Use double quotes for Chef attribute strings
Style/StringLiterals:
  EnforcedStyle: single_quotes
  ConsistentQuotesInMultiline: true

# Chef resources can have long lines
Layout/LineLength:
  Max: 120
  AllowedPatterns:
    - '^#'
    - 'https?://'
    - 'source\s+'

# Documentation not required for all classes
Style/Documentation:
  Enabled: false

# Allow rescue without exception type in Chef recipes
Style/RescueStandardError:
  Enabled: false

# Chef recipes often use block-style conditionals
Style/ConditionalAssignment:
  Enabled: false

# Chef guard clause patterns
Style/GuardClause:
  MinBodyLength: 3

# ============================================================
# Chef-specific Cops
# ============================================================

# Enforce using Chef Infra Client 17+ syntax
Chef/Modernize/DependsOnChefVaultCookbook:
  Enabled: true

Chef/Modernize/RespondToInMetadata:
  Enabled: true

Chef/Modernize/UnnecessaryMixlibShelloutRequire:
  Enabled: true

# Security best practices
Chef/Security/SshPrivateKey:
  Enabled: true

# Deprecation warnings
Chef/Deprecations/DeprecatedChefSpecPlatform:
  Enabled: true

Chef/Deprecations/ResourceUsesOnlyResourceName:
  Enabled: true
