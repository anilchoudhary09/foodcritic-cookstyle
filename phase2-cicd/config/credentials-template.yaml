# Credentials Template
#
# DO NOT COMMIT ACTUAL CREDENTIALS TO VERSION CONTROL!
#
# This template shows what credentials need to be configured in Jenkins.
# Create these credentials in Jenkins Credentials Store.

# =============================================================================
# Jenkins Credentials to Create
# =============================================================================

credentials:
  # Stash/Bitbucket access credentials (REQUIRED)
  # Type: SSH Username with private key
  # This is used to clone all repositories from Stash
  - id: "stash-credentials"
    type: "ssh-key"
    description: "Stash/Bitbucket SSH access for cloning repositories"
    username: "git"
    # Private key should be added in Jenkins UI, not here
    # Ensure the corresponding public key is added to your Stash account

  # Chef Server client key (OPTIONAL - only if using Chef Server source)
  # Type: Secret file
  - id: "chef-server-pem"
    type: "secret-file"
    description: "Chef Server client private key (.pem file)"
    # Upload the .pem file to Jenkins credentials

# =============================================================================
# Repositories Accessed by Pipeline
# =============================================================================

repositories:
  # All repositories are accessed using 'stash-credentials'

  # 1. Pipeline repository (chef-ci-pipeline)
  #    Contains: Jenkinsfile, scripts, templates
  pipeline:
    url: "ssh://git@stash.company.com:7999/chef/chef-ci-pipeline.git"

  # 2. Cookstyle rules repository (b-cookstyle-rules)
  #    Contains: barc_cops.rb, Gemfile, custom rules
  rules:
    url: "ssh://git@stash.company.com:7999/chef/b-cookstyle-rules.git"

  # 3. Cookbook repositories (provided as parameter)
  #    Example: ssh://git@stash.company.com:7999/chef/my-cookbook.git
# =============================================================================
# Jenkins Configuration Instructions
# =============================================================================

setup_instructions: |
  1. Generate SSH Key Pair (if not already done):
     ssh-keygen -t ed25519 -C "jenkins@company.com" -f jenkins_stash_key

  2. Add Public Key to Stash:
     - Go to Stash > Profile > SSH Keys
     - Click "Add key"
     - Paste contents of jenkins_stash_key.pub

  3. Add Private Key to Jenkins:
     - Navigate to Jenkins > Manage Jenkins > Credentials
     - Click "Add Credentials"
     - Kind: "SSH Username with private key"
     - ID: "stash-credentials"  (MUST match this exactly!)
     - Username: "git"
     - Private Key: Enter directly, paste contents of jenkins_stash_key

  4. Test Connection from Jenkins Agent:
     ssh -T git@stash.company.com -p 7999

  5. Install required Jenkins plugins:
     - Pipeline
     - Git
     - HTML Publisher
     - JUnit
     - Email Extension
     - AnsiColor
     - Timestamper

# =============================================================================
# Stash URL Format Reference
# =============================================================================

stash_url_format: |
  SSH Clone URL:  ssh://git@stash.company.com:7999/<PROJECT>/<REPO>.git
  HTTP Clone URL: https://stash.company.com/scm/<PROJECT>/<REPO>.git

  Examples:
    ssh://git@stash.company.com:7999/CHEF/my-cookbook.git
    ssh://git@stash.company.com:7999/CHEF/b-cookstyle-rules.git
    ssh://git@stash.company.com:7999/INFRA/web-server.git

# =============================================================================
# Security Notes
# =============================================================================

security_notes:
  - Never commit actual credentials to version control
  - Use Jenkins credentials store for all sensitive data
  - Rotate credentials regularly
  - Use minimal privilege access for service accounts
  - Audit credential usage periodically
  - Consider using HashiCorp Vault for enterprise deployments
