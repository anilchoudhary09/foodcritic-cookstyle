# Test Kitchen Configuration for Jenkins EC2 Testing
#
# This config is used by Jenkins pipeline for Chef 19 compatibility testing on EC2 instances
#
# Environment Variables Required:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION (or defaults to ap-south-1)
#   AWS_SSH_KEY_ID
#   AWS_SECURITY_GROUP
#   AWS_SUBNET_ID

---
driver:
  name: ec2
  associate_public_ip: true
  region: <%= ENV['AWS_REGION'] || 'ap-south-1' %>
  availability_zone: <%= ENV['AWS_AZ'] || 'ap-south-1a' %>
  subnet_id: <%= ENV['AWS_SUBNET_ID'] %>
  security_group_ids:
    - <%= ENV['AWS_SECURITY_GROUP'] %>
  instance_type: t3.medium
  tags:
    Name: kitchen-chef19-test
    Environment: test
    ManagedBy: test-kitchen
    Project: cookstyle-migration

provisioner:
  name: chef_infra
  product_name: chef
  product_version: 19           # Chef Client 19 for compatibility testing
  chef_license: accept-silent
  log_level: info
  always_update_cookbooks: true

verifier:
  name: inspec

transport:
  ssh_key: <%= ENV['AWS_SSH_KEY_PATH'] || '~/.ssh/kitchen-ec2.pem' %>
  connection_timeout: 60
  connection_retries: 10
  username: ec2-user

platforms:
  # RHEL 9
  - name: rhel-9
    driver:
      image_id: ami-0df368c0a5cf98a91  # RHEL 9 in ap-south-1 (update as needed)
      instance_type: t3.medium
    transport:
      username: ec2-user

  # RHEL 8
  - name: rhel-8
    driver:
      image_id: ami-0e0ff68cb8e9a188a  # RHEL 8 in ap-south-1 (update as needed)
      instance_type: t3.medium
    transport:
      username: ec2-user

  # Amazon Linux 2023
  - name: amazon-linux-2023
    driver:
      image_id: ami-0f5ee92e2d63afc18  # Amazon Linux 2023 (update as needed)
      instance_type: t3.medium
    transport:
      username: ec2-user

  # CentOS Stream 9
  - name: centos-stream-9
    driver:
      image_id: ami-0c2b8ca1dad447f8a  # CentOS Stream 9 (update as needed)
      instance_type: t3.medium
    transport:
      username: centos

suites:
  - name: default
    run_list:
      - recipe[my-app-cookbook::compliant]
    verifier:
      inspec_tests:
        - test/integration/default
    attributes:
